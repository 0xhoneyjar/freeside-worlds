schema_version: "1.0"
slug: score-api
name: "Score API"
repo: "0xHoneyJar/score-api"
description: "Hono API for THJ scoring/leaderboard (Railway migration). Issue: 0xHoneyJar/loa-freeside#159."

hosting:
  type: ECSHosting
  cpu: 256
  memory: 512
  health_check_path: "/v1/health"

env_vars:
  PORT: "3000"

secrets:
  - key: database_url
    env_var: DATABASE_URL
    lifecycle: runtime
    description: "Postgres on shared RDS instance — secret_string built from aws_db_instance.main + random_password.db_password."

compose_with: []

network:
  extra_egress_rules:
    - protocol: tcp
      from_port: 5432
      to_port: 5432
      source_security_group_ref: "aws_security_group.rds.id"
      description: "score-api world to RDS"
  extra_ingress_rules:
    - protocol: tcp
      from_port: 5432
      to_port: 5432
      source_security_group_ref: "aws_security_group.rds.id"
      description: "RDS from score-api world (paired ingress on the RDS SG)"
