schema_version: "1.0"
slug: apdao
name: "apDAO"
repo: "0xHoneyJar/apdao-world"
description: "Treasury dashboard for apDAO (Berachain)."

hosting:
  type: ECSHosting
  cpu: 256
  memory: 512

env_vars:
  PUBLIC_CHAIN_ID: "80094"
  PUBLIC_RPC_URL: "https://rpc.berachain.com"

# No runtime secrets — apdao reads chain via public RPC; no DB, no auth tokens.
secrets: []

compose_with: []

# Default egress (HTTPS:443 + EFS:2049 + Finn:3000) covers the world's needs.
